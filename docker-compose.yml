version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER}", "-d", "${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: .
    container_name: backend
    command: >
      sh -c "poetry run python src/manage.py migrate &&
             poetry run python src/manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    build: .
    container_name: celery_worker
    command: sh -c "cd src && poetry run celery -A core worker -l info"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - backend
      - redis

  celery_beat:
    build: .
    container_name: celery_beat
    command: sh -c "cd src && poetry run celery -A core beat -l info"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - backend
      - redis

  flower:
    build: .
    container_name: celery_flower
    command: sh -c "cd src && poetry run celery -A core flower --port=5555"
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - celery_worker
      - redis

volumes:
  db_data:
  redis_data:
